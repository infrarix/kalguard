# Example secret; replace base64 values. Do not commit real secrets.
# Create: kubectl apply -f deploy/k8s/secret.example.yaml
# Or: kubectl create secret generic kalguard-secrets --from-literal=token-secret=YOUR_SECRET
apiVersion: v1
kind: Secret
metadata:
  name: kalguard-secrets
  labels:
    app: kalguard-sidecar
type: Opaque
stringData:
  token-secret: 'REPLACE_WITH_YOUR_TOKEN_SECRET'

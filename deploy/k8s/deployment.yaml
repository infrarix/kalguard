# Kubernetes Deployment for KalGuard sidecar.
# Apply with: kubectl apply -f deploy/k8s/
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kalguard-sidecar
  labels:
    app: kalguard-sidecar
    version: '0.1.0'
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kalguard-sidecar
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: kalguard-sidecar
        version: '0.1.0'
      annotations:
        kubectl.kubernetes.io/default-container: sidecar
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: sidecar
          image: kalguard-sidecar:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9292
              name: http
              protocol: TCP
          env:
            - name: KALGUARD_HOST
              value: '0.0.0.0'
            - name: KALGUARD_PORT
              value: '9292'
            - name: KALGUARD_POLICY_PATH
              value: '/policy/policy.json'
            - name: KALGUARD_POLICY_DEFAULT_DENY
              value: 'true'
            - name: KALGUARD_POLICY_WATCH
              value: 'true'
            - name: KALGUARD_PROMPT_BLOCK_THRESHOLD
              value: '70'
            - name: KALGUARD_PROMPT_SANITIZE_THRESHOLD
              value: '50'
            - name: KALGUARD_AUDIT_LOG_PATH
              value: '/var/log/kalguard/audit.log'
            - name: NODE_ENV
              value: 'production'
            - name: KALGUARD_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: kalguard-secrets
                  key: token-secret
          volumeMounts:
            - name: policy
              mountPath: /policy
              readOnly: true
            - name: audit-log
              mountPath: /var/log/aarsp
          resources:
            requests:
              memory: '64Mi'
              cpu: '50m'
            limits:
              memory: '256Mi'
              cpu: '500m'
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /health
              port: 9292
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 9292
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 2
          startupProbe:
            httpGet:
              path: /health
              port: 9292
            failureThreshold: 10
            periodSeconds: 3
      volumes:
        - name: policy
          configMap:
            name: kalguard-policy
        - name: audit-log
          emptyDir: {}

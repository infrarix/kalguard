# Policy ConfigMap; mount as file in deployment.
apiVersion: v1
kind: ConfigMap
metadata:
  name: kalguard-policy
  labels:
    app: kalguard-sidecar
data:
  policy.json: |
    {
      "version": "1.0",
      "rules": [
        {
          "id": "allow-agent-1-prompt",
          "match": { "agentIds": ["agent-1"], "actions": ["prompt:check"] },
          "decision": "allow",
          "reason": "allowed"
        },
        {
          "id": "allow-agent-1-tool",
          "match": { "agentIds": ["agent-1"], "actions": ["tool:execute"] },
          "decision": "allow",
          "reason": "allowed"
        }
      ],
      "defaultDecision": "deny",
      "defaultReason": "no matching rule"
    }
